name: My First Workflow

on: push

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: list file
        run:  ls
      - name: setup node
        uses: actions/setup-node@v4
      - name: version check
        run:  node -v
      - name: starting test
        run:  npm run test
  deploy: 
    runs-on: ubuntu-latest
    needs: say-hello

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: npm install

      - name: Deploy step
        run: echo "Deploy step"
